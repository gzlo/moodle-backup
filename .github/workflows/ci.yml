name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck
      - name: Run ShellCheck
        run: shellcheck -x bin/mb lib/*.sh scripts/*.sh

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v5
      
      - name: Install BATS
        run: |
          git clone --depth 1 https://github.com/bats-core/bats-core.git /tmp/bats
          cd /tmp/bats && sudo ./install.sh /usr/local
      
      - name: Run Unit Tests
        run: bats tests/unit/
      
      - name: Run Integration Tests
        run: bats tests/integration/

  docker-test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v5
      - name: Run Docker Tests
        run: |
          docker compose -f tests/docker/docker-compose.test.yml up --build --abort-on-container-exit
          docker compose -f tests/docker/docker-compose.test.yml down -v
