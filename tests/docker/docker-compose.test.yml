version: '3.8'

services:
  mariadb:
    image: mariadb:10.6
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: moodle_test
      MYSQL_USER: moodle_user
      MYSQL_PASSWORD: moodle_pass
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpass"]
      interval: 5s
      timeout: 5s
      retries: 10

  test-runner:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ../../:/opt/moodle-backup:ro
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      DB_HOST: mariadb
      DB_NAME: moodle_test
      DB_USER: moodle_user
      DB_PASSWORD: moodle_pass
      MB_INSTALL_DIR: /opt/moodle-backup
